name: fono_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_tts: ^3.8.3
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  shared_preferences: ^2.2.2
  provider: ^6.1.2
  connectivity_plus: ^7.1.1
  video_player: ^2.8.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/INICIO/
    - assets/images/ACCIONES/
    - assets/images/PERSONAS/
    - assets/images/SALUDOS/
    - assets/images/demo/